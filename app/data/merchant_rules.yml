# Ordered merchant keyword rules. First rule with a keyword that appears as a
# substring of the normalized (lowercased) merchant wins, so more specific
# categories are listed before broad ones (e.g. Coffee before Dining Out,
# "uber eats" -> Dining Out before "uber" -> Transportation).

- category: Coffee
  keywords: [starbucks, "peet", philz, blue bottle, dunkin, coffee, "cafe", "café", espresso, caribou]

- category: Subscriptions
  keywords: [netflix, spotify, hulu, disney+, disneyplus, youtube premium, "apple.com/bill", "apple.com", adobe, notion, "github", openai, chatgpt, icloud, amazon prime, prime video, dropbox, patreon, medium, nyt, new york times]

- category: Gym / Fitness
